<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff69b4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="体重管理">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff69b4' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🧸</text></svg>">
    <title>体重管理アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe5f1 50%, #fff0f5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.3);
            border: 3px solid #ffb6c1;
        }

        h1 {
            color: #ff69b4;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
        }

        .settings-section {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid #ffc0cb;
        }

        .settings-section h2 {
            color: #ff69b4;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
        }

        .setting-item label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .setting-item input {
            padding: 10px;
            border: 2px solid #ffc0cb;
            border-radius: 10px;
            font-size: 1em;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.2);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
        }

        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-card .subtext {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 8px;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            transition: width 0.3s ease;
        }

        .input-section {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid #ffc0cb;
        }

        .input-section h2 {
            color: #ff69b4;
            margin-bottom: 15px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-item {
            display: flex;
            flex-direction: column;
        }

        .input-item label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .input-item input {
            padding: 10px;
            border: 2px solid #ffc0cb;
            border-radius: 10px;
            font-size: 1em;
        }

        .input-item input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff85c1 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(255, 182, 193, 0.2);
            border: 2px solid #ffc0cb;
        }

        .chart-container h2 {
            color: #ff69b4;
            margin-bottom: 20px;
        }

        canvas {
            max-width: 100%;
        }

        .data-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(255, 182, 193, 0.2);
            border: 2px solid #ffc0cb;
        }

        .data-table h2 {
            color: #ff69b4;
            padding: 20px;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e9 100%);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #fff5f7;
        }

        tbody td[onclick] {
            transition: background 0.2s;
        }

        tbody td[onclick]:hover {
            background: #ffe4e9;
        }

        .action-btn {
            background: #ff9999;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .month-group {
            margin-bottom: 15px;
            border: 2px solid #ffc0cb;
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }

        .month-header {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s;
            user-select: none;
        }

        .month-header:hover {
            background: linear-gradient(135deg, #ffa0ab 0%, #ffb0bb 100%);
        }

        .month-header .toggle-icon {
            font-size: 1.2em;
            transition: transform 0.3s;
        }

        .month-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .month-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .month-content.collapsed {
            max-height: 0;
        }

        .month-content table {
            margin: 0;
        }

        .month-content tbody tr:last-child {
            border-bottom: none;
        }

        .period-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .period-btn {
            background: white;
            color: #ff69b4;
            border: 2px solid #ffc0cb;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .period-btn:hover {
            background: #fff5f7;
            transform: translateY(-1px);
        }

        .period-btn.active {
            background: linear-gradient(135deg, #ff69b4 0%, #ff85c1 100%);
            color: white;
            border-color: #ff69b4;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .input-grid {
                grid-template-columns: 1fr;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .period-buttons {
                width: 100%;
                justify-content: center;
            }

            .period-btn {
                flex: 1;
                min-width: 60px;
                padding: 8px 10px;
                font-size: 0.85em;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px 5px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-card .value {
                font-size: 1.8em;
            }

            .chart-container h2 {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧸 体重管理アプリ 🧸</h1>
        
        <!-- ファイル操作ボタン -->
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn" onclick="loadDataFromFile()" style="margin: 0 5px;">📂 ファイルを開く</button>
            <button class="btn" onclick="saveDataToFile()" style="margin: 0 5px;">💾 保存</button>
            <button class="btn" onclick="createNewFile()" style="margin: 0 5px;">📄 新規作成</button>
        </div>

        <!-- 設定セクション -->
        <div class="settings-section">
            <h2>🐻 基本設定</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="height">身長 (cm)</label>
                    <input type="text" id="height" placeholder="170.0" onblur="normalizeNumber(this)">
                </div>
                <div class="setting-item">
                    <label for="targetWeight">目標体重 (kg)</label>
                    <input type="text" id="targetWeight" placeholder="65.0" onblur="normalizeNumber(this)">
                </div>
            </div>
        </div>

        <!-- 統計カード -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>💝 現在の体重</h3>
                <div class="value" id="currentWeight">--</div>
                <div class="subtext">kg</div>
            </div>
            <div class="stat-card">
                <h3>🎀 BMI</h3>
                <div class="value" id="bmiValue">--</div>
                <div class="subtext" id="bmiCategory">--</div>
            </div>
            <div class="stat-card">
                <h3>🌟 目標まで</h3>
                <div class="value" id="targetDiff">--</div>
                <div class="subtext">kg</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3>🎈 体脂肪率</h3>
                <div class="value" id="currentBodyFat">--</div>
                <div class="subtext">%</div>
            </div>
        </div>

        <!-- データ入力セクション -->
        <div class="input-section">
            <h2>🐾 データ入力</h2>
            <div class="input-grid">
                <div class="input-item">
                    <label for="date">日付</label>
                    <input type="date" id="date">
                </div>
                <div class="input-item">
                    <label for="weight">体重 (kg)</label>
                    <input type="text" id="weight" placeholder="" onblur="formatWeight(this)">
                </div>
                <div class="input-item">
                    <label for="bodyFat">体脂肪率 (%)</label>
                    <input type="text" id="bodyFat" placeholder="" onblur="formatBodyFat(this)">
                </div>
                <div class="input-item">
                    <label for="muscleMass">筋肉量 (kg)</label>
                    <input type="text" id="muscleMass" placeholder="" onblur="normalizeNumber(this)">
                </div>
            </div>
            <div style="margin-top: 15px;">
                <label for="memo" style="font-weight: 600; color: #ff69b4; display: block; margin-bottom: 5px;">💭 備考</label>
                <input type="text" id="memo" placeholder="メモを入力..." style="width: 100%; padding: 10px; border: 2px solid #ffc0cb; border-radius: 10px; font-size: 1em;">
            </div>
            <button class="btn" onclick="addRecord()" style="margin-top: 15px;">記録を追加</button>
        </div>

        <!-- グラフ -->
        <div class="chart-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <h2 style="margin: 0;">🧸 推移グラフ</h2>
                <div class="period-buttons">
                    <button class="period-btn active" onclick="changePeriod('all')">全期間</button>
                    <button class="period-btn" onclick="changePeriod(90)">3ヶ月</button>
                    <button class="period-btn" onclick="changePeriod(30)">1ヶ月</button>
                    <button class="period-btn" onclick="changePeriod(14)">2週間</button>
                    <button class="period-btn" onclick="changePeriod(7)">1週間</button>
                </div>
            </div>
            <canvas id="weightChart"></canvas>
        </div>

        <!-- データテーブル -->
        <div class="data-table">
            <h2>🐻 記録一覧</h2>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Service Worker登録（PWA化）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                    const CACHE_NAME = 'weight-tracker-v1';
                    
                    self.addEventListener('install', (event) => {
                        self.skipWaiting();
                    });
                    
                    self.addEventListener('activate', (event) => {
                        event.waitUntil(clients.claim());
                    });
                    
                    self.addEventListener('fetch', (event) => {
                        event.respondWith(
                            caches.match(event.request).then((response) => {
                                return response || fetch(event.request);
                            })
                        );
                    });
                `))
                .catch(() => {
                    // Service Worker登録失敗時は無視（通常のWebアプリとして動作）
                });
            });
        }
        
        // データ管理
        let records = [];
        let settings = {
            height: 161,
            targetWeight: 52
        };
        let dataFileHandle = null; // ファイルハンドル
        let autoSaveEnabled = true;

        let chart = null;
        let displayPeriod = 'all'; // 'all' or 日数

        // ファイルからデータを読み込み
        async function loadDataFromFile() {
            try {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                
                return new Promise((resolve) => {
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) {
                            resolve(false);
                            return;
                        }
                        
                        const text = await file.text();
                        const data = JSON.parse(text);
                        
                        records = data.records || [];
                        // 既存レコードに備考フィールドがない場合は追加
                        records = records.map(r => ({...r, memo: r.memo || ''}));
                        settings = data.settings || {height: 161, targetWeight: 52};
                        
                        // File System Access API対応ブラウザの場合、ファイルハンドルを保存
                        if (window.showOpenFilePicker) {
                            try {
                                const [fileHandle] = await window.showOpenFilePicker({
                                    types: [{
                                        description: '体重管理データ',
                                        accept: {'application/json': ['.json']}
                                    }]
                                });
                                dataFileHandle = fileHandle;
                            } catch (err) {
                                // キャンセルされた場合など
                            }
                        }
                        
                        updateDisplay();
                        alert('データを読み込みました！🧸');
                        resolve(true);
                    };
                    
                    input.click();
                });
            } catch (error) {
                console.error('データ読み込みエラー:', error);
                alert('データの読み込みに失敗しました');
                return false;
            }
        }

        // ファイルにデータを保存
        async function saveDataToFile() {
            try {
                const data = {
                    records: records,
                    settings: settings,
                    savedAt: new Date().toISOString()
                };
                
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                
                // File System Access API対応ブラウザの場合
                if (dataFileHandle && window.showSaveFilePicker) {
                    try {
                        const writable = await dataFileHandle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        return true;
                    } catch (err) {
                        // 権限エラーなどの場合、通常のダウンロードにフォールバック
                    }
                }
                
                // 通常のダウンロード
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `weight-data-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                return true;
            } catch (error) {
                console.error('データ保存エラー:', error);
                alert('データの保存に失敗しました');
                return false;
            }
        }

        // 自動保存
        async function autoSave() {
            if (!autoSaveEnabled || !dataFileHandle) {
                return;
            }
            
            try {
                const data = {
                    records: records,
                    settings: settings,
                    savedAt: new Date().toISOString()
                };
                
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                
                const writable = await dataFileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
            } catch (error) {
                console.error('自動保存エラー:', error);
                // エラーが出ても続行（次回手動保存を促す）
            }
        }

        // 新規ファイル作成
        function createNewFile() {
            if (records.length > 0) {
                if (!confirm('現在のデータは保存されていますか？新規作成すると現在のデータは失われます。')) {
                    return;
                }
            }
            
            records = [];
            settings = {
                height: 161,
                targetWeight: 52
            };
            dataFileHandle = null;
            
            document.getElementById('height').value = '';
            document.getElementById('targetWeight').value = '';
            
            updateDisplay();
            alert('新規データを作成しました。データを入力後、必ず「💾 保存」ボタンでファイルを保存してください。');
        }


        // 全角数字を半角に変換する関数
        function toHalfWidth(str) {
            return str.replace(/[０-９]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            }).replace(/[．]/g, '.');
        }

        // 体重入力の自動フォーマット関数
        function formatWeight(input) {
            let value = toHalfWidth(input.value);
            
            // すでに小数点が含まれている場合は、数字と小数点のみ許可して終了
            if (value.includes('.')) {
                value = value.replace(/[^\d.]/g, '');
                const parts = value.split('.');
                if (parts.length > 2) {
                    value = parts[0] + '.' + parts.slice(1).join('');
                }
                input.value = value;
                return;
            }
            
            // 小数点がない場合のみ自動挿入処理
            value = value.replace(/[^\d]/g, '');
            
            if (value.length === 0) {
                input.value = '';
                return;
            }
            
            // 3桁以上の場合、2桁目の後に小数点を挿入
            if (value.length >= 3) {
                value = value.slice(0, 2) + '.' + value.slice(2);
            }
            
            input.value = value;
        }

        // 体脂肪率入力の自動フォーマット関数
        function formatBodyFat(input) {
            let value = toHalfWidth(input.value);
            
            // すでに小数点が含まれている場合は、数字と小数点のみ許可して終了
            if (value.includes('.')) {
                value = value.replace(/[^\d.]/g, '');
                const parts = value.split('.');
                if (parts.length > 2) {
                    value = parts[0] + '.' + parts.slice(1).join('');
                }
                input.value = value;
                return;
            }
            
            // 小数点がない場合のみ自動挿入処理
            value = value.replace(/[^\d]/g, '');
            
            if (value.length === 0) {
                input.value = '';
                return;
            }
            
            // 3桁以上の場合、2桁目の後に小数点を挿入
            if (value.length >= 3) {
                value = value.slice(0, 2) + '.' + value.slice(2);
            }
            
            input.value = value;
        }

        // 一般的な数字入力フィールドの正規化（全角→半角、小数点対応）
        function normalizeNumber(input) {
            let value = toHalfWidth(input.value);
            // 数字と小数点のみ許可
            value = value.replace(/[^\d.]/g, '');
            // 小数点が複数ある場合、最初の1つだけ残す
            const parts = value.split('.');
            if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
            }
            input.value = value;
        }

        // 初期化
        window.onload = function() {
            document.getElementById('height').value = settings.height || '';
            document.getElementById('targetWeight').value = settings.targetWeight || '';
            document.getElementById('date').valueAsDate = new Date();
            
            // 設定変更のリスナー
            document.getElementById('height').addEventListener('change', saveSettings);
            document.getElementById('targetWeight').addEventListener('change', saveSettings);
            
            updatePlaceholders();
            updateDisplay();
        };

        // 設定の保存
        function saveSettings() {
            settings.height = parseFloat(document.getElementById('height').value) || 170;
            settings.targetWeight = parseFloat(document.getElementById('targetWeight').value) || 65;
            autoSave(); // ファイルに自動保存
            updatePlaceholders();
            updateDisplay();
        }

        // プレースホルダーを更新
        function updatePlaceholders() {
            if (settings.targetWeight) {
                document.getElementById('weight').placeholder = settings.targetWeight.toFixed(1);
            }
            
            // 目標体重から理想的な体脂肪率と筋肉量を計算（参考値）
            if (settings.targetWeight && settings.height) {
                const bmi = calculateBMI(settings.targetWeight, settings.height);
                // BMI 22を基準に理想的な体脂肪率を推定（男性15-20%、女性20-25%程度）
                const idealBodyFat = bmi < 22 ? 20.0 : 22.0;
                document.getElementById('bodyFat').placeholder = idealBodyFat.toFixed(1);
                
                // 筋肉量は目標体重の約60-70%と仮定
                const idealMuscleMass = settings.targetWeight * 0.65;
                document.getElementById('muscleMass').placeholder = idealMuscleMass.toFixed(1);
            }
        }

        // レコード追加
        function addRecord() {
            const date = document.getElementById('date').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const bodyFat = parseFloat(document.getElementById('bodyFat').value);
            const muscleMass = parseFloat(document.getElementById('muscleMass').value);
            const memo = document.getElementById('memo').value.trim();

            if (!date || !weight) {
                alert('日付と体重は必須項目です');
                return;
            }

            const record = {
                id: Date.now(),
                date: date,
                weight: weight,
                bodyFat: bodyFat || null,
                muscleMass: muscleMass || null,
                memo: memo || ''
            };

            records.push(record);
            records.sort((a, b) => new Date(b.date) - new Date(a.date));
            autoSave(); // ファイルに自動保存

            // 入力フィールドをクリア（日付以外）
            document.getElementById('weight').value = '';
            document.getElementById('bodyFat').value = '';
            document.getElementById('muscleMass').value = '';
            document.getElementById('memo').value = '';

            updateDisplay();
        }

        // レコード削除
        function deleteRecord(id) {
            if (confirm('この記録を削除してもよろしいですか？')) {
                records = records.filter(r => r.id !== id);
                autoSave(); // ファイルに自動保存
                updateDisplay();
            }
        }

        // BMI計算
        function calculateBMI(weight, height) {
            const heightM = height / 100;
            return weight / (heightM * heightM);
        }

        // BMIカテゴリー
        function getBMICategory(bmi) {
            if (bmi < 18.5) return '低体重';
            if (bmi < 25) return '普通体重';
            if (bmi < 30) return '肥満(1度)';
            if (bmi < 35) return '肥満(2度)';
            return '肥満(3度)';
        }

        // 表示更新
        function updateDisplay() {
            updateStats();
            updateChart();
            updateTable();
        }

        // 統計更新
        function updateStats() {
            if (records.length === 0) {
                document.getElementById('currentWeight').textContent = '--';
                document.getElementById('bmiValue').textContent = '--';
                document.getElementById('bmiCategory').textContent = '--';
                document.getElementById('targetDiff').textContent = '--';
                document.getElementById('currentBodyFat').textContent = '--';
                document.getElementById('progressFill').style.width = '0%';
                return;
            }

            const latestRecord = records[0];
            const currentWeight = latestRecord.weight;
            const currentBodyFat = latestRecord.bodyFat;

            // 現在の体重
            document.getElementById('currentWeight').textContent = currentWeight.toFixed(2);

            // BMI
            if (settings.height) {
                const bmi = calculateBMI(currentWeight, settings.height);
                document.getElementById('bmiValue').textContent = bmi.toFixed(1);
                document.getElementById('bmiCategory').textContent = getBMICategory(bmi);
            }

            // 目標までの差
            if (settings.targetWeight) {
                const diff = currentWeight - settings.targetWeight;
                document.getElementById('targetDiff').textContent = diff.toFixed(2);
                
                // 進捗バー（最初の記録からの進捗）
                if (records.length > 1) {
                    const startWeight = records[records.length - 1].weight;
                    const totalDiff = startWeight - settings.targetWeight;
                    const currentProgress = startWeight - currentWeight;
                    const progressPercent = totalDiff !== 0 ? (currentProgress / totalDiff) * 100 : 0;
                    document.getElementById('progressFill').style.width = Math.max(0, Math.min(100, progressPercent)) + '%';
                }
            }

            // 体脂肪率
            if (currentBodyFat !== null) {
                document.getElementById('currentBodyFat').textContent = currentBodyFat.toFixed(2);
            } else {
                document.getElementById('currentBodyFat').textContent = '--';
            }
        }

        // 表示期間変更
        function changePeriod(period) {
            displayPeriod = period;
            
            // ボタンのアクティブ状態を更新
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateChart();
        }

        // グラフ更新
        function updateChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            if (records.length === 0) {
                return;
            }

            let sortedRecords = [...records].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // 期間でフィルター
            if (displayPeriod !== 'all') {
                const today = new Date();
                const cutoffDate = new Date(today);
                cutoffDate.setDate(cutoffDate.getDate() - displayPeriod);
                sortedRecords = sortedRecords.filter(r => new Date(r.date) >= cutoffDate);
            }
            
            if (sortedRecords.length === 0) {
                return;
            }

            const dates = sortedRecords.map(r => r.date);
            const weights = sortedRecords.map(r => r.weight);
            const bodyFats = sortedRecords.map(r => r.bodyFat);
            const muscleMasses = sortedRecords.map(r => r.muscleMass);

            // 生理期間を検出（半角全角両対応）
            const periodRanges = [];
            let periodStart = null;
            sortedRecords.forEach((record, index) => {
                const memo = record.memo || '';
                // 半角全角どちらも検出
                const hasPeriod = memo.includes('おせいりさま') || memo.includes('おせいりさま');
                if (hasPeriod && periodStart === null) {
                    periodStart = index;
                } else if (!hasPeriod && periodStart !== null) {
                    periodRanges.push({ start: periodStart, end: index - 1 });
                    periodStart = null;
                }
            });
            // 最後まで続いている場合
            if (periodStart !== null) {
                periodRanges.push({ start: periodStart, end: sortedRecords.length - 1 });
            }

            const datasets = [
                {
                    label: '体重 (kg)',
                    data: weights,
                    borderColor: '#ff69b4',
                    backgroundColor: 'rgba(255, 105, 180, 0.1)',
                    tension: 0,
                    yAxisID: 'y'
                }
            ];

            if (bodyFats.some(v => v !== null)) {
                datasets.push({
                    label: '体脂肪率 (%)',
                    data: bodyFats,
                    borderColor: '#ffa07a',
                    backgroundColor: 'rgba(255, 160, 122, 0.1)',
                    tension: 0,
                    yAxisID: 'y1'
                });
            }

            if (muscleMasses.some(v => v !== null)) {
                datasets.push({
                    label: '筋肉量 (kg)',
                    data: muscleMasses,
                    borderColor: '#98d8c8',
                    backgroundColor: 'rgba(152, 216, 200, 0.1)',
                    tension: 0,
                    yAxisID: 'y'
                });
            }

            // 目標体重のライン
            if (settings.targetWeight) {
                datasets.push({
                    label: '目標体重',
                    data: Array(dates.length).fill(settings.targetWeight),
                    borderColor: '#ffd700',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    pointRadius: 0,
                    yAxisID: 'y'
                });
            }

            // 生理期間を示すプラグイン
            const periodPlugin = {
                id: 'periodBackground',
                beforeDatasetsDraw(chart) {
                    const { ctx, chartArea: { left, right, top, bottom }, scales: { x } } = chart;
                    
                    periodRanges.forEach(range => {
                        const startX = x.getPixelForValue(range.start);
                        const endX = x.getPixelForValue(range.end);
                        
                        ctx.save();
                        ctx.fillStyle = 'rgba(255, 182, 193, 0.2)'; // ピンク色の半透明
                        ctx.fillRect(startX, top, endX - startX, bottom - top);
                        ctx.restore();
                    });
                }
            };

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: sortedRecords.length > 30 ? 3 : 2,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += context.parsed.y.toFixed(1);
                                    }
                                    return label;
                                },
                                afterBody: function(context) {
                                    const index = context[0].dataIndex;
                                    const record = sortedRecords[index];
                                    const memo = record.memo || '';
                                    if (memo.includes('おせいりさま') || memo.includes('おせいりさま')) {
                                        return ['', '🌸 生理期間'];
                                    }
                                    return [];
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '体重 / 筋肉量 (kg)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: bodyFats.some(v => v !== null),
                            position: 'right',
                            title: {
                                display: true,
                                text: '体脂肪率 (%)'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    }
                },
                plugins: [periodPlugin]
            });
        }

        // テーブル更新
        function updateTable() {
            const container = document.getElementById('tableContainer');
            
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-state">まだ記録がありません。データを入力してください。</div>';
                return;
            }

            // 月ごとにグループ化
            const groupedRecords = {};
            records.forEach(record => {
                const date = new Date(record.date);
                const yearMonth = `${date.getFullYear()}年${date.getMonth() + 1}月`;
                if (!groupedRecords[yearMonth]) {
                    groupedRecords[yearMonth] = [];
                }
                groupedRecords[yearMonth].push(record);
            });

            let html = '';
            
            // 月ごとにアコーディオンを生成
            Object.keys(groupedRecords).forEach((yearMonth, index) => {
                const monthRecords = groupedRecords[yearMonth];
                const recordCount = monthRecords.length;
                
                // 最新月は開いた状態、それ以外は閉じた状態
                const isCollapsed = index > 0;
                const collapsedClass = isCollapsed ? 'collapsed' : '';
                
                html += `
                    <div class="month-group">
                        <div class="month-header ${collapsedClass}" onclick="toggleMonth(this)">
                            <span>🗓️ ${yearMonth} (${recordCount}件)</span>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div class="month-content ${collapsedClass}">
                            <table>
                                <thead>
                                    <tr>
                                        <th>日付</th>
                                        <th>体重 (kg)</th>
                                        <th>体脂肪率 (%)</th>
                                        <th>筋肉量 (kg)</th>
                                        <th>BMI</th>
                                        <th>備考</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;
                
                monthRecords.forEach(record => {
                    const bmi = settings.height ? calculateBMI(record.weight, settings.height).toFixed(1) : '--';
                    html += `
                        <tr id="row-${record.id}">
                            <td onclick="editDate(${record.id})" style="cursor: pointer;">
                                <span id="date-${record.id}">${record.date}</span>
                                <input type="date" id="date-input-${record.id}" value="${record.date}" style="display: none; width: 100%; padding: 5px; border: 1px solid #ffc0cb; border-radius: 5px;" onblur="saveDateEdit(${record.id})" onkeypress="if(event.key==='Enter') saveDateEdit(${record.id})">
                            </td>
                            <td onclick="editWeight(${record.id})" style="cursor: pointer;">
                                <span id="weight-${record.id}">${record.weight.toFixed(2)}</span>
                                <input type="text" id="weight-input-${record.id}" value="${record.weight.toFixed(2)}" style="display: none; width: 100%; padding: 5px; border: 1px solid #ffc0cb; border-radius: 5px;" oninput="formatWeight(this)" onblur="saveWeightEdit(${record.id})" onkeypress="if(event.key==='Enter') saveWeightEdit(${record.id})">
                            </td>
                            <td onclick="editBodyFat(${record.id})" style="cursor: pointer;">
                                <span id="bodyfat-${record.id}">${record.bodyFat !== null ? record.bodyFat.toFixed(2) : '--'}</span>
                                <input type="text" id="bodyfat-input-${record.id}" value="${record.bodyFat !== null ? record.bodyFat.toFixed(2) : ''}" style="display: none; width: 100%; padding: 5px; border: 1px solid #ffc0cb; border-radius: 5px;" oninput="formatBodyFat(this)" onblur="saveBodyFatEdit(${record.id})" onkeypress="if(event.key==='Enter') saveBodyFatEdit(${record.id})" placeholder="--">
                            </td>
                            <td onclick="editMuscleMass(${record.id})" style="cursor: pointer;">
                                <span id="muscle-${record.id}">${record.muscleMass !== null ? record.muscleMass.toFixed(2) : '--'}</span>
                                <input type="text" id="muscle-input-${record.id}" value="${record.muscleMass !== null ? record.muscleMass.toFixed(2) : ''}" style="display: none; width: 100%; padding: 5px; border: 1px solid #ffc0cb; border-radius: 5px;" oninput="normalizeNumber(this)" onblur="saveMuscleMassEdit(${record.id})" onkeypress="if(event.key==='Enter') saveMuscleMassEdit(${record.id})" placeholder="--">
                            </td>
                            <td>${bmi}</td>
                            <td>
                                <input type="text" value="${record.memo}" 
                                       onchange="updateMemo(${record.id}, this.value)"
                                       style="width: 100%; padding: 5px; border: 1px solid #ffc0cb; border-radius: 5px;"
                                       placeholder="メモを入力...">
                            </td>
                            <td><button class="action-btn" onclick="deleteRecord(${record.id})">削除</button></td>
                        </tr>
                    `;
                });
                
                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // アコーディオンの開閉
        function toggleMonth(header) {
            header.classList.toggle('collapsed');
            const content = header.nextElementSibling;
            content.classList.toggle('collapsed');
        }

        // 備考更新
        function updateMemo(id, memo) {
            const record = records.find(r => r.id === id);
            if (record) {
                record.memo = memo.trim();
                autoSave(); // ファイルに自動保存
            }
        }

        // 日付編集
        function editDate(id) {
            document.getElementById(`date-${id}`).style.display = 'none';
            const input = document.getElementById(`date-input-${id}`);
            input.style.display = 'block';
            input.focus();
        }

        function saveDateEdit(id) {
            const input = document.getElementById(`date-input-${id}`);
            const newDate = input.value;
            
            if (newDate) {
                const record = records.find(r => r.id === id);
                if (record) {
                    record.date = newDate;
                    records.sort((a, b) => new Date(b.date) - new Date(a.date));
                    localStorage.setItem('weightRecords', JSON.stringify(records));
                    updateDisplay();
                }
            } else {
                input.style.display = 'none';
                document.getElementById(`date-${id}`).style.display = 'block';
            }
        }

        // 体重編集
        function editWeight(id) {
            document.getElementById(`weight-${id}`).style.display = 'none';
            const input = document.getElementById(`weight-input-${id}`);
            input.style.display = 'block';
            input.focus();
            input.select();
        }

        function saveWeightEdit(id) {
            const input = document.getElementById(`weight-input-${id}`);
            const newWeight = parseFloat(input.value);
            
            if (newWeight && newWeight > 0) {
                const record = records.find(r => r.id === id);
                if (record) {
                    record.weight = newWeight;
                    localStorage.setItem('weightRecords', JSON.stringify(records));
                    updateDisplay();
                }
            } else {
                input.style.display = 'none';
                document.getElementById(`weight-${id}`).style.display = 'block';
            }
        }

        // 体脂肪率編集
        function editBodyFat(id) {
            document.getElementById(`bodyfat-${id}`).style.display = 'none';
            const input = document.getElementById(`bodyfat-input-${id}`);
            input.style.display = 'block';
            input.focus();
            input.select();
        }

        function saveBodyFatEdit(id) {
            const input = document.getElementById(`bodyfat-input-${id}`);
            const value = input.value.trim();
            
            const record = records.find(r => r.id === id);
            if (record) {
                if (value === '') {
                    record.bodyFat = null;
                } else {
                    const newBodyFat = parseFloat(value);
                    if (newBodyFat >= 0) {
                        record.bodyFat = newBodyFat;
                    }
                }
                localStorage.setItem('weightRecords', JSON.stringify(records));
                updateDisplay();
            }
        }

        // 筋肉量編集
        function editMuscleMass(id) {
            document.getElementById(`muscle-${id}`).style.display = 'none';
            const input = document.getElementById(`muscle-input-${id}`);
            input.style.display = 'block';
            input.focus();
            input.select();
        }

        function saveMuscleMassEdit(id) {
            const input = document.getElementById(`muscle-input-${id}`);
            const value = input.value.trim();
            
            const record = records.find(r => r.id === id);
            if (record) {
                if (value === '') {
                    record.muscleMass = null;
                } else {
                    const newMuscleMass = parseFloat(value);
                    if (newMuscleMass >= 0) {
                        record.muscleMass = newMuscleMass;
                    }
                }
                localStorage.setItem('weightRecords', JSON.stringify(records));
                updateDisplay();
            }
        }
    </script>
</body>
</html>
